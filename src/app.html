<!doctype html>
<html lang="en" data-bs-core="modern">

<head>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() { dataLayer.push(arguments); }
		window.gtag = gtag;

		var analyticsStarted = false;
		function shouldStartAnalytics() {
			var hostname = window.location.hostname;
			return hostname !== 'localhost' && hostname !== '127.0.0.1';
		}

		function startAnalytics() {
			if (analyticsStarted) return;
			if (!shouldStartAnalytics()) return;
			analyticsStarted = true;
			gtag('js', new Date());
			gtag('config', 'G-4J3KV26E2Z');
			var script = document.createElement('script');
			script.async = true;
			script.src = 'https://www.googletagmanager.com/gtag/js?id=G-4J3KV26E2Z';
			document.head.appendChild(script);
		}

		function scheduleAnalytics() {
			if (typeof requestIdleCallback === 'function') {
				requestIdleCallback(startAnalytics, { timeout: 4000 });
				return;
			}
			setTimeout(startAnalytics, 2500);
		}

		if (document.readyState === 'complete') {
			scheduleAnalytics();
		} else {
			window.addEventListener('load', scheduleAnalytics, { once: true });
		}
	</script>
	<!-- <script src="bytebuffer.js?1.0"></script>
		<script src="PSON.js?1.0"></script> -->
	<!--  -->
	<meta charset="utf-8" />
	<link rel="icon" type="image/x-icon" href="%sveltekit.assets%/favicon.ico" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="color-scheme" content="light dark">
	<title>Conflicts</title>
	%sveltekit.head%
	<script>
		(function () {
			function readMetaContent(name) {
				var element = document.querySelector('meta[name="' + name + '"]');
				return element ? element.getAttribute('content') : null;
			}

			function ensurePreloadLink(id, attributes) {
				if (document.getElementById(id)) return;
				var link = document.createElement('link');
				link.id = id;
				link.rel = 'preload';
				link.as = attributes.as;
				link.href = attributes.href;
				if (attributes.crossorigin) {
					link.crossOrigin = attributes.crossorigin;
				}
				if (attributes.fetchpriority) {
					link.setAttribute('fetchpriority', attributes.fetchpriority);
				}
				document.head.appendChild(link);
			}

			function ensurePrimedCompressedPayload(url) {
				if (typeof window.fetch !== 'function') return;
				var primed = window.__lcPrimedCompressedPayloads || (window.__lcPrimedCompressedPayloads = Object.create(null));
				if (primed[url]) return;

				var fetchPromise = window.fetch(url)
					.then(function (response) {
						return response.arrayBuffer();
					})
					.catch(function (error) {
						if (primed[url] === fetchPromise) {
							delete primed[url];
						}
						throw error;
					});

				primed[url] = fetchPromise;
				setTimeout(function () {
					if (primed[url] === fetchPromise) {
						delete primed[url];
					}
				}, 30000);
			}

			var pathname = window.location.pathname.replace(/\/+$/, '');
			var routeName = pathname.slice(pathname.lastIndexOf('/') + 1);
			if (routeName !== 'bubble' && routeName !== 'tiering' && routeName !== 'metric-time') return;

			var conflictId = new URLSearchParams(window.location.search).get('id');
			if (!conflictId) return;
			conflictId = conflictId.trim();
			if (!conflictId) return;

			var dataOrigin = readMetaContent('lc-data-origin');
			var graphVersion = readMetaContent('lc-graph-data-version');
			if (!dataOrigin || !graphVersion) return;

			var graphPayloadUrl =
				dataOrigin.replace(/\/+$/, '') +
				'/conflicts/graphs/' +
				encodeURIComponent(conflictId) +
				'.gzip?' +
				encodeURIComponent(graphVersion);

			ensurePreloadLink('lc-direct-graph-payload', {
				as: 'fetch',
				href: graphPayloadUrl,
				crossorigin: 'anonymous',
				fetchpriority: 'high'
			});
			ensurePrimedCompressedPayload(graphPayloadUrl);
		})();
	</script>
	<script>
		var isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
		var isLight = window.matchMedia("(prefers-color-scheme: light)").matches;
		var systemColorMode = isDark ? "dark" : (isLight ? "light" : "dark");
		var cookieVal = document.cookie.split('; ').find(row => row.startsWith('halfmoonColorMode='));
		var setColorMode = cookieVal ? cookieVal.split('=')[1] : systemColorMode;
		document.documentElement.setAttribute("data-bs-theme", setColorMode);
	</script>
</head>

<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="hover" class="app-shell">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
